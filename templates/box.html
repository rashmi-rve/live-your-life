{% extends "base.html" %}
{% block title %}The Wooden Box{% endblock %}

{% block body %}
<main class="scene sky-day">
  <div class="scene__sun"></div>
  {% include "partials/hills.html" %}

  <div class="scene__content">
    <p class="eyebrow">The journey begins</p>

    <button id="box-btn" class="box-button" aria-label="Tap the box to collect the key">
      <svg viewBox="0 0 200 200">
        <ellipse cx="100" cy="178" rx="62" ry="10" fill="rgba(43,33,24,0.15)"/>

        <!-- sparkle burst, shown once opened -->
        <g class="box-spark">
          <path d="M100 50 L104 64 L118 60 L106 70 L112 84 L100 74 L88 84 L94 70 L82 60 L96 64 Z" fill="var(--gold)"/>
        </g>

        <!-- box body -->
        <rect x="46" y="108" width="108" height="58" rx="6" fill="var(--clay-dark)" stroke="var(--ink)" stroke-width="4"/>
        <rect x="46" y="108" width="108" height="14" fill="#7C3D17" stroke="var(--ink)" stroke-width="2"/>
        <rect x="92" y="118" width="16" height="20" rx="3" fill="#3A2A1A" stroke="var(--ink)" stroke-width="2.5"/>
        <circle cx="100" cy="128" r="2.6" fill="var(--gold-soft)"/>

        <!-- lid (rotates open) -->
        <g class="box-lid">
          <rect x="42" y="86" width="116" height="28" rx="8" fill="var(--clay)" stroke="var(--ink)" stroke-width="4"/>
          <rect x="42" y="86" width="116" height="8" rx="4" fill="#D97A3B"/>
        </g>

        <!-- key, hidden until opened -->
        <g class="box-key">
          <circle cx="100" cy="60" r="13" fill="none" stroke="var(--gold)" stroke-width="6"/>
          <rect x="97" y="70" width="6" height="26" fill="var(--gold)"/>
          <rect x="103" y="84" width="8" height="5" fill="var(--gold)"/>
          <rect x="103" y="93" width="10" height="5" fill="var(--gold)"/>
        </g>
      </svg>
    </button>

    <div id="continue-wrap" class="fade-step hidden">
      <a class="btn-primary" href="{{ url_for('home_village') }}">Walk to the village</a>
    </div>
  </div>

  <div class="caption-scroll">
    <p id="box-caption">Tap on the box and collect the key</p>
  </div>
</main>
{% endblock %}

{% block script %}
<script>
  const boxBtn = document.getElementById("box-btn");
  const caption = document.getElementById("box-caption");
  const continueWrap = document.getElementById("continue-wrap");

  boxBtn.addEventListener("click", () => {
    if (boxBtn.classList.contains("opened")) return;
    boxBtn.classList.add("opened");
    caption.innerHTML = 'You found the key! <span class="caption-emphasis">It must open something nearby&hellip;</span>';
    setTimeout(() => continueWrap.classList.remove("hidden"), 650);
  });
</script>
{% endblock %}
