{% extends "base.html" %}
{% block title %}The Village{% endblock %}

{% block body %}
<main class="scene sky-day">
  <div class="scene__sun"></div>
  {% include "partials/hills.html" %}

  <div class="scene__content">
    <p class="eyebrow">The key in your hand</p>
    <h1 class="story-heading">Whose door will it open?</h1>

    <div class="village-row">

      <!-- 1. little cottage -->
      <a class="house-link house-size-1" href="{{ url_for('home_house', size=1) }}">
        <svg viewBox="0 0 160 160" aria-hidden="true">
          <path d="M40 90 L80 58 L120 90 Z" fill="var(--clay)" stroke="var(--ink)" stroke-width="4"/>
          <rect x="48" y="90" width="64" height="46" fill="#F3E3C4" stroke="var(--ink)" stroke-width="4"/>
          <rect x="70" y="108" width="16" height="28" fill="var(--clay-dark)" stroke="var(--ink)" stroke-width="2.5"/>
          <rect x="92" y="104" width="14" height="14" fill="#9FC9E0" stroke="var(--ink)" stroke-width="2"/>
        </svg>
        <span class="house-name">little cottage</span>
      </a>

      <!-- 2. cosy house -->
      <a class="house-link house-size-2" href="{{ url_for('home_house', size=2) }}">
        <svg viewBox="0 0 160 160" aria-hidden="true">
          <rect x="98" y="42" width="8" height="20" fill="#8C8C8C" stroke="var(--ink)" stroke-width="2"/>
          <path d="M32 86 L80 48 L128 86 Z" fill="var(--forest-2)" stroke="var(--ink)" stroke-width="4"/>
          <rect x="42" y="86" width="76" height="50" fill="#F6EAD2" stroke="var(--ink)" stroke-width="4"/>
          <rect x="68" y="108" width="18" height="28" fill="var(--clay)" stroke="var(--ink)" stroke-width="2.5"/>
          <rect x="50" y="100" width="14" height="14" fill="#9FC9E0" stroke="var(--ink)" stroke-width="2"/>
          <rect x="96" y="100" width="14" height="14" fill="#9FC9E0" stroke="var(--ink)" stroke-width="2"/>
        </svg>
        <span class="house-name">cosy house</span>
      </a>

      <!-- 3. wide house -->
      <a class="house-link house-size-3" href="{{ url_for('home_house', size=3) }}">
        <svg viewBox="0 0 160 160" aria-hidden="true">
          <path d="M14 84 L80 46 L146 84 Z" fill="var(--clay)" stroke="var(--ink)" stroke-width="4"/>
          <rect x="14" y="84" width="132" height="6" fill="#D97A3B" stroke="var(--ink)" stroke-width="2"/>
          <rect x="24" y="90" width="112" height="46" fill="#F3E3C4" stroke="var(--ink)" stroke-width="4"/>
          <rect x="68" y="108" width="20" height="28" fill="var(--clay-dark)" stroke="var(--ink)" stroke-width="2.5"/>
          <rect x="34" y="100" width="16" height="14" fill="#9FC9E0" stroke="var(--ink)" stroke-width="2"/>
          <rect x="110" y="100" width="16" height="14" fill="#9FC9E0" stroke="var(--ink)" stroke-width="2"/>
        </svg>
        <span class="house-name">wide house</span>
      </a>

      <!-- 4. tall house -->
      <a class="house-link house-size-4" href="{{ url_for('home_house', size=4) }}">
        <svg viewBox="0 0 160 160" aria-hidden="true">
          <path d="M46 56 L80 24 L114 56 Z" fill="var(--forest)" stroke="var(--ink)" stroke-width="4"/>
          <rect x="52" y="56" width="56" height="80" fill="#F6EAD2" stroke="var(--ink)" stroke-width="4"/>
          <rect x="68" y="108" width="18" height="28" fill="var(--clay)" stroke="var(--ink)" stroke-width="2.5"/>
          <rect x="58" y="68" width="13" height="13" fill="#9FC9E0" stroke="var(--ink)" stroke-width="2"/>
          <rect x="89" y="68" width="13" height="13" fill="#9FC9E0" stroke="var(--ink)" stroke-width="2"/>
          <rect x="58" y="90" width="13" height="13" fill="#9FC9E0" stroke="var(--ink)" stroke-width="2"/>
          <rect x="89" y="90" width="13" height="13" fill="#9FC9E0" stroke="var(--ink)" stroke-width="2"/>
        </svg>
        <span class="house-name">tall house</span>
      </a>

      <!-- 5. grand house -->
      <a class="house-link house-size-5" href="{{ url_for('home_house', size=5) }}">
        <svg viewBox="0 0 160 160" aria-hidden="true">
          <path d="M10 78 L80 30 L150 78 Z" fill="var(--clay)" stroke="var(--ink)" stroke-width="4"/>
          <rect x="10" y="78" width="140" height="7" fill="#D97A3B" stroke="var(--ink)" stroke-width="2"/>
          <rect x="20" y="85" width="120" height="51" fill="#F3E3C4" stroke="var(--ink)" stroke-width="4"/>
          <rect x="62" y="103" width="36" height="33" fill="var(--clay-dark)" stroke="var(--ink)" stroke-width="2.5"/>
          <rect x="75" y="108" width="10" height="28" fill="#7C3D17"/>
          <rect x="30" y="96" width="16" height="16" fill="#9FC9E0" stroke="var(--ink)" stroke-width="2"/>
          <rect x="114" y="96" width="16" height="16" fill="#9FC9E0" stroke="var(--ink)" stroke-width="2"/>
          <rect x="44" y="36" width="6" height="18" fill="var(--gold)"/>
          <path d="M50 36 L66 42 L50 48 Z" fill="var(--gold)"/>
        </svg>
        <span class="house-name">grand house</span>
      </a>

    </div>
  </div>

  <div class="caption-scroll">
    <p>Tap a house and see who answers the door</p>
  </div>
</main>
{% endblock %}
