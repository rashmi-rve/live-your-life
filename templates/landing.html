{% extends "base.html" %}
{% block title %}A Village Story{% endblock %}

{% block body %}
<main class="scene sky-day">
  <div class="scene__sun"></div>
  {% include "partials/hills.html" %}

  <div class="scene__content">
    <p class="eyebrow">A small story, two paths</p>
    <h1 class="story-heading">What would you choose?</h1>

    <div class="choice-row" role="group" aria-label="Choose your path">
      <a class="choice-card" href="{{ url_for('home_box') }}">
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <circle cx="60" cy="62" r="46" fill="#F6D9A8"/>
          <path d="M22 70 L60 40 L98 70 L98 96 L22 96 Z" fill="#F3E3C4" stroke="var(--ink)" stroke-width="3"/>
          <path d="M16 72 L60 36 L104 72" fill="none" stroke="var(--ink)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="36" y="76" width="20" height="20" fill="var(--clay)" stroke="var(--ink)" stroke-width="2.5"/>
          <rect x="66" y="78" width="16" height="14" fill="#9FC9E0" stroke="var(--ink)" stroke-width="2.5"/>
          <path d="M58 40 L58 26 L70 26 L70 33" fill="none" stroke="var(--ink)" stroke-width="3"/>
        </svg>
        <span class="choice-card__label">Build a home</span>
      </a>

      <a class="choice-card" href="{{ url_for('money_landing') }}">
        <svg viewBox="0 0 120 120" aria-hidden="true">
          <ellipse cx="60" cy="96" rx="42" ry="10" fill="rgba(43,33,24,0.12)"/>
          <path d="M40 50 C40 34 80 34 80 50 C92 58 90 96 60 96 C30 96 28 58 40 50 Z" fill="var(--gold-soft)" stroke="var(--ink)" stroke-width="3"/>
          <path d="M46 48 C46 36 74 36 74 48" fill="none" stroke="var(--ink)" stroke-width="3"/>
          <rect x="52" y="40" width="16" height="10" rx="2" fill="var(--clay)" stroke="var(--ink)" stroke-width="2"/>
          <circle cx="60" cy="74" r="13" fill="var(--gold)" stroke="var(--ink)" stroke-width="2.5"/>
          <text x="60" y="79" text-anchor="middle" font-family="Quicksand, sans-serif" font-weight="700" font-size="11" fill="var(--ink)">&#8377;</text>
          <text x="60" y="62" text-anchor="middle" font-family="Quicksand, sans-serif" font-weight="700" font-size="9" fill="var(--clay-dark)">100 Cr</text>
        </svg>
        <span class="choice-card__label">Collect the amount</span>
      </a>
    </div>
  </div>
</main>
{% endblock %}
